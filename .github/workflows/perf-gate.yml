name: perf-gate

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      record:
        description: "Record a fresh baseline instead of running the gate"
        type: boolean
        default: false

jobs:
  perf-gate:
    name: perf-gate
    if: ${{ github.event_name != 'workflow_dispatch' || !inputs.record }}
    runs-on: ubuntu-22.04
    # GitHub-hosted runners are CPU-noisy and the ubuntu-22.04 image
    # itself drifts under the pinned baseline, so the gate is
    # informational here. Local runs are the authoritative signal;
    # rebaseline via the manual record-baseline job when needed.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Compiler version
        run: cc --version

      - name: Bootstrap mino
        run: |
          cd mino
          gen_header() {
            local src="$1"
            local sym="$2"
            local out="src/$sym.h"
            printf 'static const char *%s_src =\n' "$sym" > "$out"
            sed 's/\\/\\\\/g; s/"/\\"/g; s/^/    "/; s/$/\\n"/' "$src" >> "$out"
            printf '    ;\n' >> "$out"
          }
          gen_header src/core.clj                     core_mino
          gen_header lib/clojure/string.clj           lib_clojure_string
          gen_header lib/clojure/set.clj              lib_clojure_set
          gen_header lib/clojure/walk.clj             lib_clojure_walk
          gen_header lib/clojure/edn.clj              lib_clojure_edn
          gen_header lib/clojure/pprint.clj           lib_clojure_pprint
          gen_header lib/clojure/zip.clj              lib_clojure_zip
          gen_header lib/clojure/data.clj             lib_clojure_data
          gen_header lib/clojure/test.clj             lib_clojure_test
          gen_header lib/clojure/template.clj         lib_clojure_template
          gen_header lib/clojure/repl.clj             lib_clojure_repl
          gen_header lib/clojure/stacktrace.clj       lib_clojure_stacktrace
          gen_header lib/clojure/datafy.clj           lib_clojure_datafy
          gen_header lib/clojure/core/protocols.clj   lib_clojure_core_protocols
          gen_header lib/clojure/instant.clj          lib_clojure_instant
          gen_header lib/clojure/spec/alpha.clj            lib_clojure_spec_alpha
          gen_header lib/clojure/core/specs/alpha.clj      lib_clojure_core_specs_alpha
          gen_header lib/clojure/test/check/generators.clj lib_clojure_test_check_generators
          gen_header lib/clojure/test/check/properties.clj lib_clojure_test_check_properties
          gen_header lib/clojure/test/check.clj            lib_clojure_test_check
          gen_header lib/mino/deps.clj                     lib_mino_deps
          gen_header lib/mino/tasks.clj                    lib_mino_tasks
          gen_header lib/mino/tasks/builtin.clj            lib_mino_tasks_builtin
          cc -std=c99 -O2 \
            -Isrc -Isrc/public -Isrc/runtime -Isrc/gc -Isrc/eval \
            -Isrc/collections -Isrc/prim -Isrc/async -Isrc/interop \
            -Isrc/diag -Isrc/vendor/imath \
            -o mino \
            src/public/*.c src/runtime/*.c src/gc/*.c src/eval/*.c \
            src/collections/*.c src/prim/*.c src/async/*.c src/interop/*.c \
            src/regex/*.c src/diag/*.c src/vendor/imath/*.c \
            main.c -lm

      - name: Build bench binaries
        run: ./mino/mino task build

      - name: Run perf gate
        run: ./mino/mino task perf-gate

  record-baseline:
    name: record baseline
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.record }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Compiler version
        run: cc --version

      - name: Bootstrap mino
        run: |
          cd mino
          gen_header() {
            local src="$1"
            local sym="$2"
            local out="src/$sym.h"
            printf 'static const char *%s_src =\n' "$sym" > "$out"
            sed 's/\\/\\\\/g; s/"/\\"/g; s/^/    "/; s/$/\\n"/' "$src" >> "$out"
            printf '    ;\n' >> "$out"
          }
          gen_header src/core.clj                     core_mino
          gen_header lib/clojure/string.clj           lib_clojure_string
          gen_header lib/clojure/set.clj              lib_clojure_set
          gen_header lib/clojure/walk.clj             lib_clojure_walk
          gen_header lib/clojure/edn.clj              lib_clojure_edn
          gen_header lib/clojure/pprint.clj           lib_clojure_pprint
          gen_header lib/clojure/zip.clj              lib_clojure_zip
          gen_header lib/clojure/data.clj             lib_clojure_data
          gen_header lib/clojure/test.clj             lib_clojure_test
          gen_header lib/clojure/template.clj         lib_clojure_template
          gen_header lib/clojure/repl.clj             lib_clojure_repl
          gen_header lib/clojure/stacktrace.clj       lib_clojure_stacktrace
          gen_header lib/clojure/datafy.clj           lib_clojure_datafy
          gen_header lib/clojure/core/protocols.clj   lib_clojure_core_protocols
          gen_header lib/clojure/instant.clj          lib_clojure_instant
          gen_header lib/clojure/spec/alpha.clj            lib_clojure_spec_alpha
          gen_header lib/clojure/core/specs/alpha.clj      lib_clojure_core_specs_alpha
          gen_header lib/clojure/test/check/generators.clj lib_clojure_test_check_generators
          gen_header lib/clojure/test/check/properties.clj lib_clojure_test_check_properties
          gen_header lib/clojure/test/check.clj            lib_clojure_test_check
          gen_header lib/mino/deps.clj                     lib_mino_deps
          gen_header lib/mino/tasks.clj                    lib_mino_tasks
          gen_header lib/mino/tasks/builtin.clj            lib_mino_tasks_builtin
          cc -std=c99 -O2 \
            -Isrc -Isrc/public -Isrc/runtime -Isrc/gc -Isrc/eval \
            -Isrc/collections -Isrc/prim -Isrc/async -Isrc/interop \
            -Isrc/diag -Isrc/vendor/imath \
            -o mino \
            src/public/*.c src/runtime/*.c src/gc/*.c src/eval/*.c \
            src/collections/*.c src/prim/*.c src/async/*.c src/interop/*.c \
            src/regex/*.c src/diag/*.c src/vendor/imath/*.c \
            main.c -lm

      - name: Build bench binaries
        run: ./mino/mino task build

      - name: Record baseline
        env:
          MINO_PERF_GATE_RECORD: "1"
        run: ./mino/mino task perf-gate

      - name: Upload baseline artifact
        uses: actions/upload-artifact@v4
        with:
          name: perf_baseline
          path: baselines/perf_baseline.edn
          if-no-files-found: error
          retention-days: 7
