name: fuzz

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Nightly at 02:17 UTC — pick an off-peak time to avoid runner queue.
    - cron: "17 2 * * *"
  workflow_dispatch:
    inputs:
      duration:
        description: "libFuzzer -max_total_time (seconds). 3600 ~= smoke, 86400 ~= 24h."
        required: false
        default: "3600"

jobs:
  smoke:
    name: corpus smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Bootstrap mino
        run: |
          cd mino
          gen_header() {
            local src="$1"
            local sym="$2"
            local out="src/$sym.h"
            printf 'static const char *%s_src =\n' "$sym" > "$out"
            sed 's/\\/\\\\/g; s/"/\\"/g; s/^/    "/; s/$/\\n"/' "$src" >> "$out"
            printf '    ;\n' >> "$out"
          }
          gen_header src/core.clj                     core_mino
          gen_header lib/clojure/string.clj           lib_clojure_string
          gen_header lib/clojure/set.clj              lib_clojure_set
          gen_header lib/clojure/walk.clj             lib_clojure_walk
          gen_header lib/clojure/edn.clj              lib_clojure_edn
          gen_header lib/clojure/pprint.clj           lib_clojure_pprint
          gen_header lib/clojure/zip.clj              lib_clojure_zip
          gen_header lib/clojure/data.clj             lib_clojure_data
          gen_header lib/clojure/test.clj             lib_clojure_test
          gen_header lib/clojure/template.clj         lib_clojure_template
          gen_header lib/clojure/repl.clj             lib_clojure_repl
          gen_header lib/clojure/stacktrace.clj       lib_clojure_stacktrace
          gen_header lib/clojure/datafy.clj           lib_clojure_datafy
          gen_header lib/clojure/core/protocols.clj   lib_clojure_core_protocols
          gen_header lib/clojure/instant.clj          lib_clojure_instant
          gen_header lib/clojure/spec/alpha.clj       lib_clojure_spec_alpha
          gen_header lib/clojure/core/specs/alpha.clj lib_clojure_core_specs_alpha
          cc -std=c99 -O2 \
            -Isrc -Isrc/public -Isrc/runtime -Isrc/gc -Isrc/eval \
            -Isrc/collections -Isrc/prim -Isrc/async -Isrc/interop \
            -Isrc/diag -Isrc/vendor/imath \
            -o mino \
            src/public/*.c src/runtime/*.c src/gc/*.c src/eval/*.c \
            src/collections/*.c src/prim/*.c src/async/*.c src/interop/*.c \
            src/regex/*.c src/diag/*.c src/vendor/imath/*.c \
            main.c -lm

      - name: Corpus smoke (every seed through stdin reader)
        run: ./mino/mino task fuzz-smoke

  libfuzzer:
    name: libFuzzer (${{ github.event_name == 'schedule' && '24h' || 'short' }})
    runs-on: ubuntu-latest
    # Only run the long fuzz job on schedule or explicit dispatch. Push
    # and PR paths stop at the smoke job above so every commit gets
    # fast signal without burning a full runner hour.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 1500  # 25h -- covers the 24h scheduled run plus overhead
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install clang with fuzzer sanitizer
        run: |
          sudo apt-get update
          sudo apt-get install -y clang

      - name: Bootstrap mino
        run: |
          cd mino
          gen_header() {
            local src="$1"
            local sym="$2"
            local out="src/$sym.h"
            printf 'static const char *%s_src =\n' "$sym" > "$out"
            sed 's/\\/\\\\/g; s/"/\\"/g; s/^/    "/; s/$/\\n"/' "$src" >> "$out"
            printf '    ;\n' >> "$out"
          }
          gen_header src/core.clj                     core_mino
          gen_header lib/clojure/string.clj           lib_clojure_string
          gen_header lib/clojure/set.clj              lib_clojure_set
          gen_header lib/clojure/walk.clj             lib_clojure_walk
          gen_header lib/clojure/edn.clj              lib_clojure_edn
          gen_header lib/clojure/pprint.clj           lib_clojure_pprint
          gen_header lib/clojure/zip.clj              lib_clojure_zip
          gen_header lib/clojure/data.clj             lib_clojure_data
          gen_header lib/clojure/test.clj             lib_clojure_test
          gen_header lib/clojure/template.clj         lib_clojure_template
          gen_header lib/clojure/repl.clj             lib_clojure_repl
          gen_header lib/clojure/stacktrace.clj       lib_clojure_stacktrace
          gen_header lib/clojure/datafy.clj           lib_clojure_datafy
          gen_header lib/clojure/core/protocols.clj   lib_clojure_core_protocols
          gen_header lib/clojure/instant.clj          lib_clojure_instant
          gen_header lib/clojure/spec/alpha.clj       lib_clojure_spec_alpha
          gen_header lib/clojure/core/specs/alpha.clj lib_clojure_core_specs_alpha
          cc -std=c99 -O2 \
            -Isrc -Isrc/public -Isrc/runtime -Isrc/gc -Isrc/eval \
            -Isrc/collections -Isrc/prim -Isrc/async -Isrc/interop \
            -Isrc/diag -Isrc/vendor/imath \
            -o mino \
            src/public/*.c src/runtime/*.c src/gc/*.c src/eval/*.c \
            src/collections/*.c src/prim/*.c src/async/*.c src/interop/*.c \
            src/regex/*.c src/diag/*.c src/vendor/imath/*.c \
            main.c -lm

      - name: Build libFuzzer target
        env:
          CC: clang
        run: ./mino/mino task fuzz-build-libfuzzer

      - name: Run libFuzzer
        run: |
          DURATION="${{ github.event.inputs.duration || '86400' }}"
          mkdir -p fuzz/artifacts
          ./fuzz/fuzz_reader_libfuzzer \
            -max_total_time=${DURATION} \
            -max_len=65536 \
            -print_final_stats=1 \
            -artifact_prefix=fuzz/artifacts/ \
            fuzz/corpus

      - name: Upload crash artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: libfuzzer-artifacts
          path: fuzz/artifacts/
          if-no-files-found: ignore
